[tool.mypy]
python_version = "3.12"
disallow_untyped_defs = true
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = ["webrtcvad", "faster_whisper"]
ignore_missing_imports = true

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"